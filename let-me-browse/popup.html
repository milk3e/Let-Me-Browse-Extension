<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Let Me Browse</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --surface: #181818;
      --border: #2a2a2a;
      --accent: #c8ff57;
      --text: #f0f0f0;
      --muted: #aaaaaa;
      --radius: 6px;
    }

    /* Fixed size — prevents Firefox popup resize flicker entirely */
    html, body {
      width: 240px;
      height: 130px;
      min-width: 240px;
      min-height: 130px;
      max-width: 240px;
      max-height: 130px;
      overflow: hidden;
    }

    body {
      font-family: ui-monospace, "Cascadia Code", "Menlo", "Consolas", monospace;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
      user-select: none;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 11.5px;
      font-weight: normal;
      letter-spacing: normal;
      text-transform: none;
      color: var(--text);
    }

    /* Status box — always rendered, just swaps class */
    .status {
      padding: 9px 11px;
      border-radius: var(--radius);
      font-size: 11.5px;
      letter-spacing: 0.03em;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      line-height: 1.3;
    }

    .status.ok  { background: #111a00; border-color: #3a5200; color: var(--accent); }
    .status.err { background: #1a0a0a; border-color: #520000; color: #ff6b6b; }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .ok .dot  { }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .hint {
      margin-top: 9px;
      font-size: 10px;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">Let Me Browse</span>
  </div>

  <div class="status" id="status">
    <span class="dot"></span>
    <span id="statusText">Unlocking page…</span>
  </div>

  <p class="hint" id="hint">Removing scroll locks and overlays.</p>

  <script src="popup.js"></script>
</body>
</html>
